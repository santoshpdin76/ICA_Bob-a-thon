<!DOCTYPE html>
<html>
<head>
    <title>Login Debug</title>
</head>
<body>
    <h1>Login API Test</h1>
    <button onclick="testLogin()">Test Login</button>
    <pre id="output"></pre>

    <script>
        async function testLogin() {
            const output = document.getElementById('output');
            output.textContent = 'Testing login...\n';
            
            try {
                const response = await fetch('http://localhost:3001/api/v1/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'admin123'
                    })
                });
                
                output.textContent += `Status: ${response.status}\n`;
                output.textContent += `Status Text: ${response.statusText}\n\n`;
                
                const data = await response.json();
                output.textContent += 'Response:\n' + JSON.stringify(data, null, 2);
                
                if (data.success) {
                    output.textContent += '\n\n✅ LOGIN SUCCESSFUL!';
                    output.textContent += '\nAccess Token: ' + data.data.accessToken.substring(0, 50) + '...';
                }
            } catch (error) {
                output.textContent += '\n❌ ERROR: ' + error.message;
                console.error('Full error:', error);
            }
        }
    </script>
</body>
</html>
